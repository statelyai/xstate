name: Node CI

on:
  push:
    branches:
      - main
      - next
  pull_request:
    branches:
      - '**'

permissions:
  contents: read #  to fetch code (actions/checkout)

jobs:
  build:
    timeout-minutes: 20

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/ci-setup
      - uses: ./.github/actions/ci-checks
